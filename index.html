<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#003087">
  <title>Follow Yardi on Social Media — #YASCCanada</title>
  <style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }

/* ── Page ── */
body {
  min-height: 100dvh;
  background: #eef1f8;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
  overflow: hidden;
}

/* Subtle radial glow behind content */
body::before {
  content: '';
  position: fixed;
  top: -10%;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(0,48,135,0.1) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Card wrapper ── */
.card {
  width: 100%;
  max-width: 360px;
  background: #fff;
  border-radius: 28px;
  box-shadow:
    0 2px 4px rgba(0,48,135,0.04),
    0 8px 24px rgba(0,48,135,0.09),
    0 24px 48px rgba(0,48,135,0.06);
  padding: 32px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Header ── */
.logo-pill {
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  color: #fff;
  background: #003087;
  padding: 5px 14px;
  border-radius: 5px;
  margin-bottom: 20px;
}

.hashtag {
  font-size: 1.25rem;
  font-weight: 900;
  color: #003087;
  letter-spacing: 0.02em;
  text-align: center;
  margin-bottom: 6px;
}

.headline {
  font-size: 0.72rem;
  font-weight: 800;
  color: #001a4d;
  letter-spacing: 0.1em;
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.body-copy {
  font-size: 0.68rem;
  color: #5a6f8a;
  text-align: center;
  line-height: 1.65;
  max-width: 268px;
  margin-bottom: 22px;
}

.divider {
  width: 32px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #003087, transparent);
  border-radius: 2px;
  margin-bottom: 24px;
  opacity: 0.3;
}

/* ── Carousel ── */
.carousel-section {
  width: 100%;
  margin-bottom: 14px;
}


/* Coins track — evenly spaces all 4 */
.coins-track {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-evenly;
  height: 88px;
}

/* ── Coins ── */
.coin {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
  transition:
    width 0.32s cubic-bezier(.34,1.4,.64,1),
    height 0.32s cubic-bezier(.34,1.4,.64,1),
    opacity 0.32s ease,
    box-shadow 0.32s ease,
    transform 0.32s cubic-bezier(.34,1.4,.64,1);
  background: #fff;
}
.coin svg { display: block; pointer-events: none; transition: width 0.32s, height 0.32s; }

/* Active coin */
.coin-active {
  width: 68px;
  height: 68px;
  box-shadow: 0 6px 20px rgba(0,48,135,0.2), 0 0 0 2px #003087;
  opacity: 1;
  z-index: 2;
  animation: bob 2.8s ease-in-out infinite;
}
.coin-active svg { width: 38px; height: 38px; }

.coin-active::after {
  content: '';
  position: absolute;
  inset: -7px;
  border-radius: 50%;
  border: 2px solid #003087;
  opacity: 0;
  animation: pulse-ring 2.8s ease-out infinite;
  pointer-events: none;
}

.coin-active:hover {
  animation-play-state: paused;
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 10px 28px rgba(0,48,135,0.28), 0 0 0 2px #003087;
}

/* Idle coins */
.coin-idle {
  width: 52px;
  height: 52px;
  box-shadow: 0 2px 8px rgba(0,48,135,0.08), 0 0 0 1.5px #dde4f2;
  opacity: 0.6;
  z-index: 1;
}
.coin-idle svg { width: 29px; height: 29px; }

.coin-idle:hover {
  opacity: 0.88;
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 16px rgba(0,48,135,0.14), 0 0 0 1.5px #b0bcd8;
}

/* ── Animations ── */
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-7px); }
}

@keyframes pulse-ring {
  0%   { opacity: 0.45; transform: scale(0.9); }
  70%  { opacity: 0;    transform: scale(1.3); }
  100% { opacity: 0;    transform: scale(1.3); }
}

/* ── Labels ── */
.platform-label {
  font-size: 0.72rem;
  font-weight: 800;
  color: #003087;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  min-height: 1.1em;
  margin-bottom: 5px;
}

.swipe-hint {
  font-size: 0.56rem;
  color: #b0bcd0;
  text-align: center;
  letter-spacing: 0.03em;
}

/* ── Dot indicators ── */
.dots {
  display: flex;
  gap: 6px;
  margin-top: 14px;
}
.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #d0d8ea;
  transition: background 0.25s, transform 0.25s;
}
.dot.active {
  background: #003087;
  transform: scale(1.3);
}

/* ── Follow panel ── */
.panel-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,20,60,0.5);
  z-index: 10;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  animation: fade-in 0.2s ease;
}
.panel-backdrop.active { display: block; }

.follow-panel {
  display: none;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(24px);
  width: min(400px, 100vw);
  background: #fff;
  border-radius: 28px 28px 0 0;
  padding: 10px 28px 32px;
  padding-bottom: max(32px, env(safe-area-inset-bottom));
  z-index: 11;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  opacity: 0;
  box-shadow: 0 -4px 32px rgba(0,48,135,0.14);
  transition: transform 0.32s cubic-bezier(.34,1.3,.64,1), opacity 0.22s ease;
}
.follow-panel.active {
  display: flex;
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Drag handle */
.panel-handle-bar {
  width: 36px;
  height: 4px;
  background: #dde4f0;
  border-radius: 2px;
  margin-bottom: 8px;
}

.panel-icon { margin-bottom: 2px; }
.panel-icon svg { width: 64px; height: 64px; display: block; }

.panel-name {
  font-size: 1.15rem;
  font-weight: 900;
  color: #001a4d;
  letter-spacing: 0.02em;
}

.panel-handle-text {
  font-size: 0.72rem;
  color: #8899bb;
  letter-spacing: 0.02em;
}

.panel-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 260px;
  background: #003087;
  color: #fff;
  border-radius: 14px;
  padding: 14px 24px;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-decoration: none;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
  box-shadow: 0 4px 18px rgba(0,48,135,0.32);
}
.panel-btn:hover  { background: #0044bb; transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,48,135,0.42); }
.panel-btn:active { transform: scale(0.97); }

.panel-dismiss {
  font-size: 0.58rem;
  color: #b0bcd0;
  margin-top: 2px;
}

/* ── Keyframes ── */
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  .coin-active, .coin-active::after { animation: none; }
  .coin, .nav-btn, .panel-btn, .follow-panel { transition: none; }
}
  </style>
</head>
<body>

  <div class="card">

    <!-- Header -->
    <div class="logo-pill">YARDI</div>
    <div class="hashtag">#YASCCanada</div>
    <h1 class="headline">Stay Connected With Us</h1>
    <p class="body-copy">See event updates, announcements and highlights! Follow us on LinkedIn, Facebook, Instagram and X, and don't forget to tag us and use the official hashtag when sharing your YASC moments.</p>
    <div class="divider"></div>

    <!-- Carousel -->
    <section class="carousel-section" aria-label="Social media accounts">
      <div class="coins-track" id="coins-track" role="list"></div>
    </section>

    <div class="platform-label" id="platform-label" aria-live="polite"></div>
    <div class="swipe-hint">tap to follow &nbsp;·&nbsp; swipe to browse</div>
    <div class="dots" id="dots" aria-hidden="true"></div>

  </div>

  <!-- Follow panel -->
  <div class="panel-backdrop" id="panel-backdrop" aria-hidden="true"></div>
  <div class="follow-panel" id="follow-panel" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="panel-handle-bar"></div>
    <div class="panel-icon" id="panel-icon"></div>
    <div class="panel-name" id="panel-name"></div>
    <div class="panel-handle-text" id="panel-handle"></div>
    <a class="panel-btn" id="panel-btn" target="_blank" rel="noopener noreferrer"></a>
    <div class="panel-dismiss">tap anywhere to close</div>
  </div>

  <script>
const PLATFORMS = [
  {
    name: 'LinkedIn',
    handle: 'Yardi',
    url: 'https://www.linkedin.com/company/yardi/posts/?feedView=all',
    svg: `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="20" fill="#0A66C2"/>
      <rect x="10" y="17" width="5" height="13" fill="white"/>
      <circle cx="12.5" cy="12.5" r="2.8" fill="white"/>
      <path d="M18 17h4.8v1.8c.7-1.1 2.1-2.1 4.2-2.1 4.2 0 5 2.8 5 6.4V30h-5v-6c0-1.4 0-3.3-2-3.3s-2.3 1.6-2.3 3.2V30H18V17z" fill="white"/>
    </svg>`
  },
  {
    name: 'Facebook',
    handle: 'Yardi',
    url: 'https://www.facebook.com/Yardi/',
    svg: `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="20" fill="#1877F2"/>
      <path d="M22.5 21h3.2l.6-4H22.5v-2.3c0-1.1.3-1.9 2-1.9H26.5V9.2C26 9.1 24.6 9 23 9c-3.2 0-5.4 2-5.4 5.5V17H14v4h3.6v10h4.9V21z" fill="white"/>
    </svg>`
  },
  {
    name: 'Instagram',
    handle: '@yardisystems',
    url: 'https://www.instagram.com/yardisystems/?hl=en',
    svg: `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ig-SUFFIX" cx="30%" cy="107%" r="130%">
          <stop offset="0%"   stop-color="#ffd600"/>
          <stop offset="30%"  stop-color="#ff6d00"/>
          <stop offset="60%"  stop-color="#e1306c"/>
          <stop offset="80%"  stop-color="#833ab4"/>
          <stop offset="100%" stop-color="#405de6"/>
        </radialGradient>
      </defs>
      <rect width="40" height="40" rx="20" fill="url(#ig-SUFFIX)"/>
      <rect x="10" y="10" width="20" height="20" rx="6" stroke="white" stroke-width="2.2" fill="none"/>
      <circle cx="20" cy="20" r="5" stroke="white" stroke-width="2.2" fill="none"/>
      <circle cx="27.2" cy="12.8" r="1.4" fill="white"/>
    </svg>`
  },
  {
    name: 'X',
    handle: '@Yardi',
    url: 'https://x.com/Yardi',
    svg: `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="20" fill="#000"/>
      <path d="M22.05 18.8 28.6 11h-1.58l-5.63 6.55L17.04 11H11.4l6.9 10.04L11.4 29h1.58l6.03-7.01L23.96 29h5.64l-7.55-10.2zm-2.13 2.48-.7-.99-5.55-7.95H16.3l4.48 6.41.7.99 5.83 8.34H24.7l-4.77-6.8z" fill="white"/>
    </svg>`
  }
];

let current = 0;

function stampSvg(svg, id) {
  return svg.replace(/SUFFIX/g, id);
}

function renderCarousel() {
  const track = document.getElementById('coins-track');
  track.innerHTML = '';

  PLATFORMS.forEach((platform, idx) => {
    const isActive = idx === current;
    const coin = document.createElement('div');
    coin.setAttribute('role', 'listitem');
    coin.className = isActive ? 'coin coin-active' : 'coin coin-idle';
    coin.setAttribute('aria-label', isActive
      ? `${platform.name} — tap to follow`
      : `Switch to ${platform.name}`);
    coin.innerHTML = stampSvg(platform.svg, `c${idx}`);
    coin.addEventListener('click', () => {
      if (isActive) openPanel(idx);
      else { current = idx; renderCarousel(); }
    });
    track.appendChild(coin);
  });

  document.getElementById('platform-label').textContent = PLATFORMS[current].name;
  renderDots();
}

function renderDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  PLATFORMS.forEach((_, idx) => {
    const dot = document.createElement('div');
    dot.className = idx === current ? 'dot active' : 'dot';
    container.appendChild(dot);
  });
}


renderCarousel();

function openPanel(idx) {
  const p = PLATFORMS[idx];
  document.getElementById('panel-icon').innerHTML = stampSvg(p.svg, 'panel');
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-handle').textContent = p.handle;
  const btn = document.getElementById('panel-btn');
  btn.textContent = `Follow Yardi on ${p.name} →`;
  btn.href = p.url;

  const panel = document.getElementById('follow-panel');
  const backdrop = document.getElementById('panel-backdrop');
  panel.removeAttribute('aria-hidden');
  backdrop.removeAttribute('aria-hidden');
  panel.style.display = 'flex';
  backdrop.classList.add('active');
  requestAnimationFrame(() => requestAnimationFrame(() => panel.classList.add('active')));
}

function closePanel() {
  const panel = document.getElementById('follow-panel');
  const backdrop = document.getElementById('panel-backdrop');
  panel.classList.remove('active');
  backdrop.classList.remove('active');
  panel.setAttribute('aria-hidden', 'true');
  backdrop.setAttribute('aria-hidden', 'true');
  setTimeout(() => { panel.style.display = 'none'; }, 320);
}

document.getElementById('panel-backdrop').addEventListener('click', closePanel);

(function attachSwipe() {
  let startX = null;
  document.querySelector('.coins-track').addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  }, { passive: true });
  document.querySelector('.coins-track').addEventListener('touchend', e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    startX = null;
    if (Math.abs(dx) < 40) return;
    current = dx < 0
      ? (current + 1) % PLATFORMS.length
      : (current - 1 + PLATFORMS.length) % PLATFORMS.length;
    renderCarousel();
  }, { passive: true });
})();
  </script>

</body>
</html>
